<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% seo %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Intergalactic Bounce",
    "description": "Bouncy castle hire in Palnackie and Dalbeattie, Dumfries and Galloway, Scotland.",
    "url": "https://intergalacticbounce.co.uk",
    "telephone": "+447827910339",
    "email": "chris@nashintergalactic.com",
    "priceRange": "£40/hour",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Palnackie",
      "addressRegion": "Dumfries and Galloway",
      "addressCountry": "GB"
    },
    "areaServed": [
      { "@type": "City", "name": "Palnackie" },
      { "@type": "City", "name": "Dalbeattie" }
    ],
    "openingHoursSpecification": {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
      "opens": "09:00",
      "closes": "19:00"
    }
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --space:          #0F0524;
      --purple-dark:    #4C1D95;
      --purple-mid:     #7C3AED;
      --purple-light:   #A78BFA;
      --yellow:         #FCD34D;
      --pink:           #F472B6;
      --bg:             #FAF5FF;
      --bg-card:        #FFFFFF;
      --text:           #1C1917;
      --text-light:     #6B7280;
      --border:         #E9D5FF;
      --radius:         10px;
      --shadow:         0 2px 12px rgba(124,58,237,0.10);
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
      font-size: 17px;
    }

    a { color: var(--purple-mid); text-decoration: none; }
    a:hover { color: var(--purple-dark); text-decoration: underline; }

    /* -- HEADER -- */
    .site-header {
      background: var(--space);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      min-height: 62px;
    }
    .site-title {
      font-size: 1.25rem;
      font-weight: bold;
      color: #fff;
      letter-spacing: 0.01em;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.75rem 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    .site-title:hover { color: var(--yellow); text-decoration: none; }
    .site-title .icon { font-size: 1.5rem; }

    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.15rem;
      align-items: center;
    }
    .site-nav a {
      color: rgba(255,255,255,0.85);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 0.45rem 0.7rem;
      border-radius: var(--radius);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .site-nav a:hover {
      background: var(--purple-dark);
      color: #fff;
      text-decoration: none;
    }
    .site-nav a.nav-cta {
      background: var(--purple-mid);
      color: #fff;
      border: 1px solid var(--purple-light);
      margin-left: 0.35rem;
    }
    .site-nav a.nav-cta:hover {
      background: var(--pink);
      border-color: var(--pink);
      color: #fff;
    }

    /* -- MAIN -- */
    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* -- FOOTER -- */
    .site-footer {
      background: var(--space);
      color: rgba(255,255,255,0.65);
      text-align: center;
      padding: 2.5rem 1.25rem;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.85rem;
    }
    .site-footer .tagline {
      color: var(--yellow);
      font-style: italic;
      margin-bottom: 0.6rem;
      font-size: 1rem;
    }
    .site-footer a { color: rgba(255,255,255,0.65); }
    .site-footer a:hover { color: #fff; }
    .site-footer .footer-links {
      margin-top: 0.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* -- BUTTONS -- */
    .btn {
      display: inline-block;
      padding: 0.65rem 1.4rem;
      border-radius: var(--radius);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      border: none;
    }
    .btn:hover { transform: translateY(-2px); text-decoration: none; }
    .btn-primary {
      background: var(--purple-mid);
      color: #fff;
      box-shadow: 0 4px 14px rgba(124,58,237,0.35);
    }
    .btn-primary:hover {
      background: var(--purple-dark);
      color: #fff;
      box-shadow: 0 6px 18px rgba(124,58,237,0.45);
    }
    .btn-yellow {
      background: var(--yellow);
      color: var(--space);
      box-shadow: 0 4px 14px rgba(252,211,77,0.4);
    }
    .btn-yellow:hover {
      background: #F59E0B;
      color: var(--space);
    }
    .btn-outline {
      background: transparent;
      color: var(--purple-mid);
      border: 2px solid var(--purple-mid);
    }
    .btn-outline:hover {
      background: var(--purple-mid);
      color: #fff;
    }
    .btn-lg { padding: 0.85rem 2rem; font-size: 1.05rem; }

    /* -- CARDS -- */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    /* -- FORMS -- */
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--purple-dark);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: Georgia, serif;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--purple-mid);
    }
    .form-group textarea { resize: vertical; min-height: 100px; }

    /* -- RESPONSIVE -- */
    @media (max-width: 640px) {
      .header-inner { padding: 0 0.75rem; }
      .site-nav a { padding: 0.35rem 0.5rem; font-size: 0.78rem; }
      .page-wrap { padding: 1.5rem 0.75rem 3rem; }
      body { font-size: 16px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">
        <span class="icon">🚀</span> Intergalactic Bounce
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/faq/' | relative_url }}">FAQ</a>
        <a href="{{ '/book/' | relative_url }}" class="nav-cta">Book Now</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p class="tagline">Bouncy castle hire in Palnackie &amp; Dalbeattie ✨</p>
    <p>&copy; {{ 'now' | date: "%Y" }} Intergalactic Bounce &mdash; Dumfries &amp; Galloway, Scotland</p>
    <div class="footer-links">
      <a href="{{ '/book/' | relative_url }}">Book Now</a>
      <a href="{{ '/faq/' | relative_url }}">FAQ</a>
    </div>
  </footer>

</body>
</html>
