title: Intergalactic Bounce
description: Bouncy castle hire in Palnackie and Dalbeattie, Dumfries and Galloway. £40/hour — message us on WhatsApp to book.
url: https://intergalacticbounce.co.uk
baseurl: "/intergalacticbounce.com"

author:
  name: Intergalactic Bounce
  email: hello@intergalacticbounce.co.uk

markdown: kramdown
highlighter: rouge
permalink: /:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

timezone: Europe/London
lang: en-GB
